<!DOCTYPE html>
<html lang="en" data-theme="light" data-accent="gold">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Helix — App</title>
<link rel="stylesheet" href="css/helix.css" />
<link rel="stylesheet" href="css/app.css" />
<script>
  // set theme before paint to avoid flash (shares the landing-page preference)
  (function () {
    try {
      var t = localStorage.getItem('helix-theme');
      if (t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {}
  })();
</script>
</head>
<body class="booting">

<!-- boot / preloader (reused from the landing identity) -->
<div id="boot" aria-hidden="true">
  <div class="boot-orbit" aria-hidden="true">
    <span class="bo-glow"></span><span class="bo-ring"></span>
    <span class="bo-arc a1"></span><span class="bo-arc a2"></span><span class="bo-arc a3"></span>
    <span class="bo-dot"><i></i></span><span class="bo-core"></span>
  </div>
  <div class="boot-word">Heli<b>x</b></div>
  <div class="boot-meta"><span class="live"></span><span class="lbl">waking the ecosystem</span></div>
</div>

<!-- Prod compiler wiring: live Render TEE service. For local dev, comment this out
     (app.js then falls back to http://localhost:8081). -->
<script>window.HELIX_COMPILER_URL = 'https://helix-compiler.onrender.com';</script>

<!-- zkLogin "Continue with Google": paste a Google OAuth *Web* client id below to
     light up the button. Create one at https://console.cloud.google.com/apis/credentials
     (OAuth client → Web application) and register these Authorized redirect URIs:
        https://helix-app-fovn.onrender.com/app.html
        http://localhost:5173/app.html   (or whatever local port you serve on)
     The button stays HIDDEN until this is set, so there is never a dead button. -->
<script>window.HELIX_GOOGLE_CLIENT_ID = '';</script>

<!-- app shell is built by app.js (ES module: Sui SDK + Wallet Standard from CDN) -->
<script type="module" src="js/app.js"></script>
</body>
</html>
